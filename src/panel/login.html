<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chaos Studio</title>
    <link rel="stylesheet" href="../css/panel/login.css">
</head>
<body>
    <div id="main-wrapper">
        <div class="login-card">
            <div class="logo-box">
                <img src="../../assets/icono/ft2.png" class="launcher-logo" alt="Chaos Studio Logo">
            </div>
            <h1 class="login-title">INICIAR SESIÓN</h1>
            <p class="login-subtitle">Como quieres iniciar sesión?</p>

            <div class="login-options">
                <div class="offline-container">
                    <input type="text" id="offline-user" placeholder="Ingresa tu nombre..." spellcheck="false" class="offline-input">
                    <button id="btn-play" class="btn-login">
                        Iniciar Sesión Offline
                    </button>
                </div>

                <div class="custom-divider">
                    <div class="divider-line"></div>
                    <div class="divider-dot"></div>
                    <div class="divider-line"></div>
                </div>

                <button class="btn-microsoft">
                    Iniciar Sesión con Microsoft
                </button>
            </div>

            <p class="launcher-footer-name">Chaos Studio</p>
        </div>
    </div>
    <script src="../js/panel/login.js"></script>
</body>
</html>
